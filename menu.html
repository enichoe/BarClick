<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BarClick - Menu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#141414',
                        card: '#1a1a1a',
                        border: '#2a2a2a',
                        muted: '#6b6b6b',
                        fg: '#f5f5f5',
                        accent: '#d4af37',
                        success: '#22c55e'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f4e4a6 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .glass { background: rgba(26, 26, 26, 0.95); backdrop-filter: blur(20px); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        .bebida-card { transition: transform 0.2s ease; }
        .bebida-card:active { transform: scale(0.98); }
        .cart-badge { transition: transform 0.2s ease; }
        .cart-badge.bounce { animation: bounce 0.3s ease; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        input:focus, textarea:focus { outline: none; border-color: #d4af37; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-bg min-h-screen pb-24">
    <!-- Header -->
    <header class="sticky top-0 z-40 glass border-b border-border">
        <div class="px-4 py-4">
            <div class="flex items-center justify-between">
                <div>
                    <h1 id="barName" class="text-lg font-bold gold-gradient">BarClick</h1>
                    <p id="eventoName" class="text-sm text-muted">Cargando evento...</p>
                </div>
                <button onclick="toggleCart()" class="relative p-2 text-fg">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/>
                    </svg>
                    <span id="cartCount" class="cart-badge absolute -top-1 -right-1 w-5 h-5 bg-accent text-bg text-xs font-bold rounded-full flex items-center justify-center hidden">0</span>
                </button>
            </div>
        </div>
        
        <!-- Category Filter -->
        <div class="px-4 pb-3 overflow-x-auto hide-scrollbar">
            <div id="categoryFilter" class="flex gap-2"></div>
        </div>
    </header>

    <!-- Drinks Grid -->
    <main class="p-4">
        <div id="bebidasGrid" class="grid grid-cols-2 gap-3"></div>
        <div id="emptyState" class="hidden text-center py-12">
            <svg class="w-16 h-16 mx-auto text-muted mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <p class="text-muted">No hay bebidas disponibles</p>
        </div>
    </main>

    <!-- Cart Drawer -->
    <div id="cartDrawer" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-bg/80 backdrop-blur-sm" onclick="toggleCart()"></div>
        <div class="absolute bottom-0 left-0 right-0 glass border-t border-border rounded-t-3xl max-h-[85vh] overflow-hidden slide-up">
            <div class="p-4 border-b border-border">
                <div class="w-12 h-1 bg-border rounded-full mx-auto mb-4"></div>
                <h2 class="text-xl font-bold text-fg">Tu Pedido</h2>
            </div>
            
            <div id="cartItems" class="p-4 overflow-y-auto max-h-[40vh] space-y-3"></div>
            
            <div class="p-4 border-t border-border">
                <form id="pedidoForm" onsubmit="submitPedido(event)" class="space-y-3">
                    <input type="text" name="nombre" required placeholder="Tu nombre" class="w-full px-4 py-3 bg-surface border border-border rounded-xl text-fg placeholder-muted">
                    <input type="tel" name="telefono" placeholder="WhatsApp (opcional)" class="w-full px-4 py-3 bg-surface border border-border rounded-xl text-fg placeholder-muted">
                    <textarea name="notas" rows="2" placeholder="Notas especiales (opcional)" class="w-full px-4 py-3 bg-surface border border-border rounded-xl text-fg placeholder-muted resize-none"></textarea>
                    <button type="submit" id="submitBtn" class="w-full py-4 bg-accent text-bg font-bold rounded-xl text-lg disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                        Enviar Pedido
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="successModal" class="fixed inset-0 z-50 hidden items-center justify-center p-4 bg-bg/90 backdrop-blur-sm">
        <div class="bg-card border border-border rounded-3xl p-8 text-center max-w-sm w-full fade-in">
            <div class="w-20 h-20 bg-success/20 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-success" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            <h3 class="text-2xl font-bold text-fg mb-2">Pedido Enviado</h3>
            <p class="text-muted mb-6">Tu pedido ha sido recibido. Te notificaremos cuando este listo.</p>
            <button onclick="closeSuccessModal()" class="w-full py-3 bg-accent text-bg font-semibold rounded-xl">
                Aceptar
            </button>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-bg z-50 flex items-center justify-center">
        <div class="text-center">
            <div class="w-16 h-16 border-4 border-border border-t-accent rounded-full animate-spin mx-auto mb-4"></div>
            <p class="text-fg">Cargando menu...</p>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabaseClient.js"></script>
    <script src="js/menu.js"></script>
</body>
</html>
