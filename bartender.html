<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarClick - Panel de Bartender</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg: '#0a0a0a',
                        surface: '#141414',
                        card: '#1a1a1a',
                        border: '#2a2a2a',
                        muted: '#6b6b6b',
                        fg: '#f5f5f5',
                        accent: '#d4af37',
                        success: '#22c55e',
                        warning: '#f59e0b',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>
    <style>
        * { font-family: 'DM Sans', sans-serif; }
        .font-display { font-family: 'Playfair Display', serif; }
        .gold-gradient {
            background: linear-gradient(135deg, #d4af37 0%, #f4e4a6 50%, #d4af37 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .order-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .order-card.pendiente { border-top: 4px solid #f59e0b; }
        .order-card.preparando { border-top: 4px solid #3b82f6; }
        .order-card.listo { border-top: 4px solid #22c55e; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .slide-in { animation: slideIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-bg min-h-screen">
    <!-- Header -->
    <header class="bg-surface border-b border-border sticky top-0 z-40 p-4 lg:p-6">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-accent/20 flex items-center justify-center">
                    <svg class="w-6 h-6 text-accent" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M8 21h8m-4-4v4m-5-8l2-9h6l2 9M5 9h14a2 2 0 012 2v2a7 7 0 01-14 0v-2a2 2 0 012-2z" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-bold gold-gradient">BarClick</h1>
                    <p class="text-xs text-muted font-bold tracking-widest uppercase">Panel de Bartender</p>
                </div>
            </div>

            <div class="flex items-center gap-4">
                <select id="eventoFilter" onchange="filterPedidos()" class="bg-card border border-border text-fg text-sm rounded-xl px-4 py-2 outline-none focus:border-accent hidden md:block">
                    <option value="">Todos los eventos</option>
                </select>
                <button onclick="logout()" class="p-2 text-muted hover:text-danger">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 lg:p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 id="eventoActual" class="text-2xl font-display font-bold text-fg">Pedidos Recientes</h2>
        </div>

        <!-- Kanban Board -->
        <div class="grid md:grid-cols-3 gap-6">
            <!-- Pendiente -->
            <div class="space-y-4">
                <div class="flex items-center justify-between bg-warning/10 p-3 rounded-xl border border-warning/20">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-warning"></span>
                        <h3 class="font-bold text-warning text-sm uppercase tracking-wider">Pendientes</h3>
                    </div>
                    <span id="countPendiente" class="text-xs font-black bg-warning text-bg px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colPendiente" class="space-y-4"></div>
            </div>

            <!-- Preparando -->
            <div class="space-y-4">
                <div class="flex items-center justify-between bg-blue-500/10 p-3 rounded-xl border border-blue-500/20">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        <h3 class="font-bold text-blue-500 text-sm uppercase tracking-wider">Preparando</h3>
                    </div>
                    <span id="countPreparando" class="text-xs font-black bg-blue-500 text-white px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colPreparando" class="space-y-4"></div>
            </div>

            <!-- Listo -->
            <div class="space-y-4">
                <div class="flex items-center justify-between bg-success/10 p-3 rounded-xl border border-success/20">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-success"></span>
                        <h3 class="font-bold text-success text-sm uppercase tracking-wider">Listos</h3>
                    </div>
                    <span id="countListo" class="text-xs font-black bg-success text-white px-2 py-0.5 rounded-full">0</span>
                </div>
                <div id="colListo" class="space-y-4"></div>
            </div>
        </div>
    </main>
